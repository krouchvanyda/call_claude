# ===========================================================================
# ERP backend — Laravel 8 / PHP 7.4 stack
#   web    nginx reverse proxy (http://localhost:8080) — routes /ws to stomp,
#          everything else to the php-fpm app. Same origin/port as the REST API,
#          matching the Spring deployment the Flutter app expects.
#   app    php-fpm (runs migrate --seed on boot)
#   stomp  STOMP-over-WebSocket server (erp:stomp-serve) — the Spring SimpleBroker
#          replacement; reached via nginx at /ws and /ws-sockjs
#   redis  shared cache (presence state) + STOMP fan-out pub/sub channel
#   db     PostgreSQL 17
# ===========================================================================
services:
  db:
    image: postgres:17
    environment:
      POSTGRES_DB: ${DB_DATABASE:-erp}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      # Host 55432 -> container 5432 (avoids clashing with a local Postgres on
      # 5432). Containers still reach the DB via db:5432 on the compose network.
      - "55432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # On a FRESH volume, Postgres runs database/backups/00-restore.sh, which
      # pg_restores erp_data.dump (real production data) and stamps Laravel's
      # migrations table. To re-trigger: `docker compose down -v && up`.
      - ./database/backups:/docker-entrypoint-initdb.d:ro

  redis:
    image: redis:7-alpine

  app:
    build: .
    depends_on:
      - db
      - redis
    env_file: .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_CLIENT: predis
      CACHE_DRIVER: redis
      BROADCAST_DRIVER: "null"
    entrypoint: ["bash", "/var/www/html/docker/entrypoint.sh"]
    volumes:
      - ./:/var/www/html
      # Preserve the image-built vendor/. The host vendor/ is incomplete (no
      # vendor/autoload.php), and the bind mount above would otherwise shadow
      # the image's good copy — crashing artisan on boot.
      - /var/www/html/vendor
      - avatars:/var/www/html/uploads

  stomp:
    build: .
    depends_on:
      - db
      - redis
    env_file: .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_CLIENT: predis
      CACHE_DRIVER: redis
    command: ["php", "artisan", "erp:stomp-serve", "--host=0.0.0.0", "--port=8090"]
    volumes:
      - ./:/var/www/html
      # Preserve the image-built vendor/ (see note on the app service).
      - /var/www/html/vendor
      - avatars:/var/www/html/uploads

  # Laravel scheduler — runs schedule:run every minute (Kernel::schedule):
  #   • erp:sweep-call-timeouts — auto-MISS unanswered calls + emit call.hangup
  #     / call.cancel (without this, ringing calls never time out on mobile)
  #   • erp:purge-refresh-tokens — hourly cleanup
  scheduler:
    build: .
    depends_on:
      - db
      - redis
    env_file: .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_CLIENT: predis
      CACHE_DRIVER: redis
    command: ["php", "artisan", "schedule:work"]
    volumes:
      - ./:/var/www/html
      - /var/www/html/vendor
      - avatars:/var/www/html/uploads

  web:
    image: nginx:1.25-alpine
    depends_on:
      - app
      - stomp
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - avatars:/var/www/html/uploads
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  pgdata:
  avatars:
